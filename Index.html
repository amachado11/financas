<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Finanças Master Elite v24</title>
    <style>
        :root { --primaria: #007AFF; --ganho: #34C759; --gasto: #FF3B30; --fundo: #F2F2F7; --edicao: #FF9500; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--fundo); height: 100vh; display: flex; flex-direction: column; color: #1c1c1e; }
        .header { background: white; padding: 15px; border-bottom: 1px solid #ddd; text-align: center; font-weight: bold; flex-shrink: 0; }
        .conteudo { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }
        .aba { display: none; }
        .aba.ativa { display: block; }
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        
        /* SELETORES */
        .filtro-mes { background: #e9e9eb; border: none; padding: 8px 12px; border-radius: 10px; font-weight: bold; font-size: 14px; }

        /* CALENDÁRIO */
        .seletor-mes-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 10px; }
        .resumo-topo-cal { display: flex; justify-content: space-around; background: white; padding: 12px; border-radius: 12px; margin-bottom: 15px; font-size: 12px; border: 1px solid #eee; }
        .dias-semana-topo { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 10px; font-weight: bold; color: #8e8e93; margin-bottom: 5px; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #d1d1d6; border-radius: 12px; overflow: hidden; border: 1px solid #d1d1d6; }
        .dia { background: white; min-height: 100px; padding: 5px; display: flex; flex-direction: column; }
        .dia.hoje { background: #f2f9ff; box-shadow: inset 0 0 0 2px var(--primaria); }
        .dia-n { font-weight: 700; color: #8e8e93; font-size: 12px; margin-bottom: 4px; }
        .v-dia { font-size: 9px; line-height: 1.1; font-weight: 600; margin-bottom: 2px; }
        .saldo-d { margin-top: auto; font-weight: 800; text-align: right; font-size: 11px; color: #3a3a3c; padding-top: 3px; border-top: 1px solid #f2f2f7; }

        /* NAVEGAÇÃO */
        .nav { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); display: flex; height: 75px; border-top: 1px solid #d1d1d6; z-index: 9999; }
        .nav-btn { flex: 1; border: none; background: none; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #8e8e93; }
        .nav-btn.ativo { color: var(--primaria); font-weight: bold; }
        
        /* FORM E LISTA */
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #d1d1d6; font-size: 16px; }
        .btn-principal { background: var(--primaria); color: white; border: none; font-weight: bold; margin-top: 10px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f2f2f7; }
        .tag { font-size: 9px; padding: 2px 6px; border-radius: 5px; font-weight: 700; text-transform: uppercase; }
        .btn-acao { width: 34px; height: 34px; border-radius: 8px; border: none; font-size: 14px; background: #f2f2f7; margin-left: 5px; }
    </style>
</head>
<body>

<div class="header">Finanças Master Elite</div>

<div class="conteudo">
    <div id="aba-add" class="aba ativa">
        <div class="card">
            <input type="hidden" id="edit-id">
            <input type="date" id="data">
            <input type="text" id="desc" placeholder="O que foi?">
            <input type="number" id="valor" placeholder="R$ 0,00" inputmode="decimal">
            <div style="display:flex; gap:8px">
                <select id="cat" style="flex:2">
                    <option value="Alimentação">🍕 Alimentação</option>
                    <option value="Transporte">🚗 Transporte</option>
                    <option value="Lazer">🎡 Lazer</option>
                    <option value="Contas">🏠 Contas Fixas</option>
                    <option value="Saúde">🏥 Saúde</option>
                    <option value="Mercado">🛒 Mercado</option>
                    <option value="Salário">💰 Salário</option>
                    <option value="Outros">⚙️ Outros</option>
                </select>
                <select id="tipo" style="flex:1.2"><option value="gasto">(-) Saiu</option><option value="ganho">(+) Entrou</option></select>
            </div>
            <button id="btn-salvar" class="btn-principal" onclick="salvar()">Salvar Lançamento</button>
            <button id="btn-cancelar" style="display:none; background:#8e8e93; color:white;" onclick="cancelarEdicao()">Cancelar</button>
        </div>
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
                <strong>Histórico</strong>
                <input type="month" id="filtro-historico" class="filtro-mes" onchange="listar()">
            </div>
            <div id="lista"></div>
        </div>
    </div>

    <div id="aba-cal" class="aba">
        <div class="seletor-mes-container">
            <button onclick="mudarMes(-1)" style="border:none; background:none; font-size:24px">❮</button>
            <span id="mes-label" style="font-size:18px; font-weight:800"></span>
            <button onclick="mudarMes(1)" style="border:none; background:none; font-size:24px">❯</button>
        </div>
        <div class="resumo-topo-cal">
            <div style="text-align:center">Ganhos<br><b style="color:var(--ganho)" id="res-ganho">R$ 0</b></div>
            <div style="text-align:center">Gastos<br><b style="color:var(--gasto)" id="res-gasto">R$ 0</b></div>
            <div style="text-align:center">Saldo<br><b id="res-saldo">R$ 0</b></div>
        </div>
        <div class="dias-semana-topo">
            <div>DOM</div><div>SEG</div><div>TER</div><div>QUA</div><div>QUI</div><div>SEX</div><div>SÁB</div>
        </div>
        <div class="grid" id="grid"></div>
    </div>

    <div id="aba-rel" class="aba">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
                <strong style="font-size:16px">Análise Mensal</strong>
                <input type="month" id="rel-mes" class="filtro-mes" onchange="gerarRel()">
            </div>
            <div id="resumo-total"></div>
        </div>
        <div id="resumo-categorias" class="card"><div id="cat-lista"></div></div>
    </div>
</div>

<div class="nav">
    <button class="nav-btn ativo" onclick="ir('add', this)">➕<br>Lançar</button>
    <button class="nav-btn" onclick="ir('cal', this)">📅<br>Calendário</button>
    <button class="nav-btn" onclick="ir('rel', this)">📊<br>Análise</button>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('financas_v_final')) || [];
    let dataRef = new Date();
    const coresCat = {'Alimentação': '#FF9500', 'Transporte': '#5AC8FA', 'Lazer': '#AF52DE', 'Contas': '#FF3B30', 'Saúde': '#FF2D55', 'Mercado': '#FFCC00', 'Salário': '#34C759', 'Outros': '#8E8E93'};

    function ir(aba, btn) {
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('ativo'));
        document.getElementById('aba-' + aba).classList.add('ativa');
        btn.classList.add('ativo');
        if(aba === 'cal') render();
        if(aba === 'add') listar();
        if(aba === 'rel') gerarRel();
    }

    function mudarMes(n) { dataRef.setMonth(dataRef.getMonth() + n); render(); }

    function salvar() {
        const d = document.getElementById('data').value, v = parseFloat(document.getElementById('valor').value);
        if(!d || isNaN(v)) return alert("Dados incompletos!");
        const item = { id: document.getElementById('edit-id').value ? parseInt(document.getElementById('edit-id').value) : Date.now(), data: d, desc: document.getElementById('desc').value || 'S/N', valor: v, tipo: document.getElementById('tipo').value, cat: document.getElementById('cat').value };
        if(document.getElementById('edit-id').value) db = db.map(i => i.id === item.id ? item : i); else db.push(item);
        localStorage.setItem('financas_v_final', JSON.stringify(db));
        cancelarEdicao(); listar();
    }

    function prepararEdicao(id) {
        const i = db.find(x => x.id === id);
        document.getElementById('edit-id').value = i.id; document.getElementById('data').value = i.data;
        document.getElementById('desc').value = i.desc; document.getElementById('valor').value = i.valor;
        document.getElementById('cat').value = i.cat; document.getElementById('tipo').value = i.tipo;
        document.getElementById('btn-salvar').innerText = "Atualizar"; document.getElementById('btn-cancelar').style.display = "block";
    }

    function cancelarEdicao() {
        document.getElementById('edit-id').value = ""; document.getElementById('data').valueAsDate = new Date();
        document.getElementById('desc').value = ""; document.getElementById('valor').value = "";
        document.getElementById('btn-salvar').innerText = "Salvar Lançamento"; document.getElementById('btn-cancelar').style.display = "none";
    }

    function deletar(id) { if(confirm("Excluir?")) { db = db.filter(i => i.id !== id); localStorage.setItem('financas_v_final', JSON.stringify(db)); listar(); } }

    function listar() {
        const l = document.getElementById('lista'), m = document.getElementById('filtro-historico').value;
        l.innerHTML = "";
        db.filter(i => i.data.startsWith(m)).reverse().forEach(i => {
            l.innerHTML += `<div class="item"><div><span class="tag" style="background:${coresCat[i.cat]}22; color:${coresCat[i.cat]}">${i.cat}</span><br><b>${i.desc}</b><br><small style="color:${i.tipo=='ganho'?'green':'red'}">R$ ${i.valor.toFixed(2)}</small></div><div style="display:flex"><button onclick="prepararEdicao(${i.id})" class="btn-acao">✏️</button><button onclick="deletar(${i.id})" class="btn-acao">🗑️</button></div></div>`;
        });
    }

    function render() {
        const g = document.getElementById('grid'), label = document.getElementById('mes-label');
        const ano = dataRef.getFullYear(), mes = dataRef.getMonth();
        label.innerText = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"][mes] + " " + ano;
        g.innerHTML = "";
        const inicio = new Date(ano, mes, 1).getDay(), fim = new Date(ano, mes + 1, 0).getDate();
        let saldoAcumulado = 0, ganhoMes = 0, gastoMes = 0;

        db.sort((a,b)=>a.data.localeCompare(b.data)).forEach(i => {
            const dt = new Date(i.data + "T00:00:00");
            if(dt < new Date(ano, mes, 1)) saldoAcumulado += (i.tipo=='ganho'?i.valor:-i.valor);
            else if(i.data.startsWith(dataRef.toISOString().substring(0,7))) {
                if(i.tipo=='ganho') ganhoMes+=i.valor; else gastoMes+=i.valor;
            }
        });

        document.getElementById('res-ganho').innerText = "R$ " + ganhoMes.toFixed(0);
        document.getElementById('res-gasto').innerText = "R$ " + gastoMes.toFixed(0);
        document.getElementById('res-saldo').innerText = "R$ " + (ganhoMes - gastoMes).toFixed(0);

        for(let i=0; i<inicio; i++) g.innerHTML += `<div class="dia" style="background:#f2f2f7"></div>`;
        for(let d=1; d<=fim; d++) {
            const dataI = `${ano}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            let ganhoD = 0, gastoD = 0;
            db.filter(x => x.data === dataI).forEach(i => {
                if(i.tipo == 'ganho') ganhoD += i.valor; else gastoD += i.valor;
                saldoAcumulado += (i.tipo=='ganho'?i.valor:-i.valor);
            });
            g.innerHTML += `<div class="dia ${dataI==new Date().toISOString().substring(0,10)?'hoje':''}">
                <span class="dia-n">${d}</span>
                <div class="v-dia" style="color:var(--ganho)">${ganhoD>0?'R$ '+ganhoD.toFixed(0):''}</div>
                <div class="v-dia" style="color:var(--gasto)">${gastoD>0?'R$ '+gastoD.toFixed(0):''}</div>
                <div class="saldo-d" style="color:${saldoAcumulado>=0?'#34C759':'#FF3B30'}">R$ ${saldoAcumulado.toFixed(0)}</div>
            </div>`;
        }
    }

    function gerarRel() {
        const m = document.getElementById('rel-mes').value, filtrados = db.filter(it => it.data.startsWith(m));
        let g=0, s=0, cats = {};
        filtrados.forEach(it => { if(it.tipo==='ganho') g+=it.valor; else { s+=it.valor; cats[it.cat]=(cats[it.cat]||0)+it.valor; } });
        const econ = g > 0 ? (((g-s)/g)*100).toFixed(1) : 0;
        document.getElementById('resumo-total').innerHTML = `<div style="background:#f8f8f8; padding:12px; border-radius:12px; margin-bottom:15px; text-align:center">
            <small>Economia Real do Mês</small><br><strong style="font-size:24px; color:${econ>=0?'var(--ganho)':'var(--gasto)'}">${econ}%</strong></div>
            <div style="display:flex; justify-content:space-around; font-size:13px">
                <div>Ganhos<br><b style="color:green">R$ ${g.toFixed(2)}</b></div>
                <div>Gastos<br><b style="color:red">R$ ${s.toFixed(2)}</b></div>
                <div>Saldo<br><b>R$ ${(g-s).toFixed(2)}</b></div>
            </div>`;
        const cl = document.getElementById('cat-lista'); cl.innerHTML = "<strong>Gastos por Categoria</strong><br><br>";
        Object.entries(cats).sort((a,b)=>b[1]-a[1]).forEach(([c, v]) => {
            const p = s > 0 ? (v/s*100).toFixed(0) : 0;
            cl.innerHTML += `<div style="margin-bottom:12px"><div style="display:flex; justify-content:space-between; font-size:13px"><span>${c}</span><span>R$ ${v.toFixed(2)} (${p}%)</span></div>
                <div style="background:#eee; height:6px; border-radius:3px; margin-top:4px"><div style="background:${coresCat[c]}; width:${p}%; height:100%; border-radius:3px"></div></div></div>`;
        });
    }

    window.onload = () => { 
        const mes = new Date().toISOString().substring(0,7);
        document.getElementById('data').valueAsDate = new Date();
        document.getElementById('filtro-historico').value = mes;
        document.getElementById('rel-mes').value = mes;
        listar(); render(); 
    };
</script>
</body>
</html>
