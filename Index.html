<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Finanças Master Elite v26</title>
    <style>
        :root { --primaria: #007AFF; --ganho: #34C759; --gasto: #FF3B30; --fundo: #F2F2F7; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--fundo); color: #1c1c1e; display: flex; flex-direction: column; height: 100vh; }
        .header { background: white; padding: 15px; border-bottom: 1px solid #ddd; text-align: center; font-weight: bold; }
        .conteudo { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; }
        .aba { display: none; }
        .aba.ativa { display: block; }
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        
        /* META DIÁRIA */
        .meta-topo { background: #fff3cd; padding: 12px; border-radius: 12px; text-align: center; margin-bottom: 10px; border: 1px solid #ffeeba; }
        .meta-topo b { display: block; font-size: 22px; color: #856404; }

        /* CALENDÁRIO COM NEGATIVOS */
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #d1d1d6; border-radius: 12px; overflow: hidden; }
        .dia { background: white; min-height: 95px; padding: 4px; display: flex; flex-direction: column; position: relative; }
        .dia.hoje { background: #f2f9ff; box-shadow: inset 0 0 0 2px var(--primaria); }
        .dia-n { font-weight: bold; color: #8e8e93; font-size: 11px; }
        .v-dia { font-size: 9px; font-weight: 600; margin-top: 1px; }
        .saldo-d { margin-top: auto; font-weight: 800; text-align: right; font-size: 10px; padding-top: 2px; border-top: 1px solid #f2f2f7; }

        /* NAV */
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 75px; border-top: 1px solid #d1d1d6; }
        .nav-btn { flex: 1; border: none; background: none; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #8e8e93; }
        .nav-btn.ativo { color: var(--primaria); font-weight: bold; }
        
        input, select, button { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #d1d1d6; font-size: 16px; margin: 4px 0; }
        .btn-principal { background: var(--primaria); color: white; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">Finanças Master Elite</div>

<div class="conteudo">
    <div id="aba-add" class="aba ativa">
        <div class="card">
            <input type="date" id="data">
            <input type="text" id="desc" placeholder="Ex: Ganho Uber Manhã">
            <input type="number" id="valor" placeholder="R$ 0,00" inputmode="decimal">
            <div style="display:flex; gap:8px">
                <select id="cat" style="flex:2">
                    <option value="Salário">💰 Ganho Uber/99</option>
                    <option value="Transporte">🚗 Combustível</option>
                    <option value="Contas">🏠 Conta Fixa</option>
                    <option value="Alimentação">🍕 Alimentação</option>
                    <option value="Outros">⚙️ Outros</option>
                </select>
                <select id="tipo" style="flex:1"><option value="gasto">Saiu</option><option value="ganho">Entrou</option></select>
            </div>
            <button class="btn-principal" onclick="salvar()">Salvar</button>
        </div>
        <div id="lista" class="card"></div>
    </div>

    <div id="aba-cal" class="aba">
        <div class="meta-topo">
            Faturamento necessário hoje:
            <b id="meta-dia-valor">R$ 0,00</b>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
            <button onclick="mudarMes(-1)" style="width:40px; border:none; background:none; font-size:20px">❮</button>
            <strong id="mes-label"></strong>
            <button onclick="mudarMes(1)" style="width:40px; border:none; background:none; font-size:20px">❯</button>
        </div>
        <div id="grid" class="grid"></div>
    </div>

    <div id="aba-rel" class="aba">
        <div class="card">
            <label>Sua meta de sobra no mês (Lucro):</label>
            <input type="number" id="meta-lucro-input" value="3000" onchange="salvarMeta(this.value)">
            <p style="font-size:12px; color:#666">O app usará isso para calcular quanto você precisa ganhar por dia.</p>
        </div>
        <div id="rel-dados" class="card"></div>
    </div>
</div>

<div class="nav">
    <button class="nav-btn ativo" onclick="ir('add', this)">➕<br>Lançar</button>
    <button class="nav-btn" onclick="ir('cal', this)">📅<br>Calendário</button>
    <button class="nav-btn" onclick="ir('rel', this)">📊<br>Análise</button>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('financas_v_final')) || [];
    let metaLucro = parseFloat(localStorage.getItem('meta_lucro')) || 3000;
    let dataRef = new Date();

    function salvarMeta(v) { metaLucro = parseFloat(v); localStorage.setItem('meta_lucro', v); render(); }

    function ir(aba, btn) {
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('ativo'));
        document.getElementById('aba-' + aba).classList.add('ativa');
        btn.classList.add('ativo');
        if(aba==='cal') render();
    }

    function salvar() {
        const d = document.getElementById('data').value, v = parseFloat(document.getElementById('valor').value);
        if(!d || isNaN(v)) return;
        db.push({ id: Date.now(), data: d, desc: document.getElementById('desc').value, valor: v, tipo: document.getElementById('tipo').value, cat: document.getElementById('cat').value });
        localStorage.setItem('financas_v_final', JSON.stringify(db));
        render(); listar();
    }

    function mudarMes(n) { dataRef.setMonth(dataRef.getMonth() + n); render(); }

    function render() {
        const g = document.getElementById('grid'), label = document.getElementById('mes-label');
        const ano = dataRef.getFullYear(), mes = dataRef.getMonth();
        label.innerText = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"][mes] + " " + ano;
        g.innerHTML = "";
        
        const fim = new Date(ano, mes + 1, 0).getDate();
        const inicio = new Date(ano, mes, 1).getDay();
        const hojeIso = new Date().toISOString().split('T')[0];

        // Cálculo da Meta Diária (Uber Style)
        let totalGastoMes = 0;
        db.filter(i => i.data.startsWith(dataRef.toISOString().substring(0,7)) && i.tipo === 'gasto').forEach(i => totalGastoMes += i.valor);
        const diasNoMes = fim;
        const diaAtual = new Date().getDate();
        const diasRestantes = (diasNoMes - diaAtual) + 1;
        const metaNecessaria = (totalGastoMes + metaLucro) / (diasRestantes > 0 ? diasRestantes : 1);
        document.getElementById('meta-dia-valor').innerText = "R$ " + (metaNecessaria > 0 ? metaNecessaria : 0).toFixed(2);

        let saldoAcumulado = 0;
        // Saldo inicial (meses anteriores)
        db.forEach(i => { if(new Date(i.data) < new Date(ano, mes, 1)) saldoAcumulado += (i.tipo==='ganho'?i.valor:-i.valor); });

        for(let i=0; i<inicio; i++) g.innerHTML += `<div class="dia" style="background:#f2f2f7"></div>`;
        
        for(let d=1; d<=fim; d++) {
            const dataI = `${ano}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            let ganhoD = 0, gastoD = 0;
            db.filter(x => x.data === dataI).forEach(i => {
                if(i.tipo === 'ganho') ganhoD += i.valor; else gastoD += i.valor;
            });
            saldoAcumulado += (ganhoD - gastoD);

            g.innerHTML += `<div class="dia ${dataI === hojeIso ? 'hoje' : ''}">
                <span class="dia-n">${d}</span>
                <div class="v-dia" style="color:var(--ganho)">${ganhoD > 0 ? '+'+ganhoD.toFixed(0) : ''}</div>
                <div class="v-dia" style="color:var(--gasto)">${gastoD > 0 ? '-'+gastoD.toFixed(0) : ''}</div>
                <div class="saldo-d" style="color:${saldoAcumulado >= 0 ? 'var(--ganho)' : 'var(--gasto)'}">R$ ${saldoAcumulado.toFixed(0)}</div>
            </div>`;
        }
    }

    function listar() {
        const l = document.getElementById('lista'); l.innerHTML = "<strong>Últimos Lançamentos</strong>";
        db.slice(-5).reverse().forEach(i => {
            l.innerHTML += `<div style="display:flex; justify-content:space-between; font-size:12px; padding:5px 0; border-bottom:1px solid #eee">
                <span>${i.desc}</span><b style="color:${i.tipo==='ganho'?'green':'red'}">R$ ${i.valor.toFixed(2)}</b>
            </div>`;
        });
    }

    window.onload = () => { 
        document.getElementById('data').valueAsDate = new Date();
        document.getElementById('meta-lucro-input').value = metaLucro;
        listar(); render(); 
    };
</script>
</body>
</html>
