<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Finanças Master Elite</title>
<style>
:root { --primaria:#007AFF; --ganho:#34C759; --gasto:#FF3B30; --fundo:#F2F2F7; }
body { font-family:sans-serif; margin:0; background:var(--fundo); }
.header { background:white; padding:15px; text-align:center; font-weight:bold; }
.card { background:white; padding:15px; border-radius:12px; margin:10px; }
.aba { display:none; }
.ativa { display:block; }
.nav { position:fixed; bottom:0; width:100%; display:flex; background:white; }
.nav button { flex:1; padding:15px; border:none; background:none; }
canvas { width:100%; }
</style>
</head>
<body><div class="header">Finanças Master Elite</div><div id="aba-add" class="aba ativa">
<div class="card">
<input type="hidden" id="edit-id">
<input type="date" id="data">
<input type="text" id="desc" placeholder="Descrição">
<input type="number" id="valor" placeholder="Valor">
<select id="cat">
<option>Alimentação</option><option>Transporte</option><option>Lazer</option><option>Contas</option><option>Saúde</option><option>Mercado</option><option>Salário</option><option>Outros</option>
</select>
<select id="tipo"><option value="gasto">Gasto</option><option value="ganho">Ganho</option></select>
<button onclick="salvar()">Salvar</button>
</div>
<div id="lista" class="card"></div>
</div><div id="aba-cal" class="aba">
<div class="card" id="grid"></div>
</div><div id="aba-rel" class="aba">
<div class="card">
<input type="month" id="rel-mes" onchange="gerarRel()">
<div id="resumo-total"></div>
</div>
<div class="card"><canvas id="graficoPizza" height="200"></canvas></div>
<div class="card"><canvas id="graficoLinha" height="200"></canvas></div>
<div class="card" id="cat-lista"></div>
</div><div class="nav">
<button onclick="ir('add')">➕</button>
<button onclick="ir('cal')">📅</button>
<button onclick="ir('rel')">📊</button>
</div><script>
let db;
try { db = JSON.parse(localStorage.getItem('financas_v_final')) || []; } catch { db = []; }

const coresCat = {
'Alimentação':'#FF9500','Transporte':'#5AC8FA','Lazer':'#AF52DE','Contas':'#FF3B30','Saúde':'#FF2D55','Mercado':'#FFCC00','Salário':'#34C759','Outros':'#8E8E93'
};

function ir(a){ document.querySelectorAll('.aba').forEach(x=>x.classList.remove('ativa')); document.getElementById('aba-'+a).classList.add('ativa'); if(a==='rel') gerarRel(); if(a==='add') listar(); }

function salvar(){
 const d=document.getElementById('data').value;
 const v=parseFloat(document.getElementById('valor').value);
 if(!d||isNaN(v)) return alert('Preencha');
 db.push({id:Date.now(),data:d,desc:document.getElementById('desc').value||'S/N',valor:v,tipo:document.getElementById('tipo').value,cat:document.getElementById('cat').value});
 localStorage.setItem('financas_v_final',JSON.stringify(db));
 listar();
}

function listar(){
 const l=document.getElementById('lista');
 l.innerHTML='';
 db.slice().reverse().forEach(i=>{
  l.innerHTML+=`<div>${i.data} - ${i.desc} - R$ ${i.valor}</div>`;
 });
}

function gerarRel(){
 const mesSel=document.getElementById('rel-mes').value;
 const filtrados=db.filter(i=>i.data.startsWith(mesSel));
 let g=0,s=0,cats={};
 filtrados.forEach(i=>{
  if(i.tipo==='ganho') g+=i.valor;
  else { s+=i.valor; cats[i.cat]=(cats[i.cat]||0)+i.valor; }
 });

 document.getElementById('resumo-total').innerHTML=`Ganhos: R$ ${g.toFixed(2)}<br>Gastos: R$ ${s.toFixed(2)}<br><b>Saldo: R$ ${(g-s).toFixed(2)}</b>`;

 desenharPizza(cats);
 graficoLinha(mesSel);

 const catLista=document.getElementById('cat-lista');
 catLista.innerHTML='<b>Categorias</b><br>';
 Object.entries(cats).forEach(([c,v])=>{
  catLista.innerHTML+=`${c}: R$ ${v.toFixed(2)}<br>`;
 });
}

function desenharPizza(cats){
 const canvas=document.getElementById('graficoPizza');
 const ctx=canvas.getContext('2d');
 const total=Object.values(cats).reduce((a,b)=>a+b,0);
 let inicio=0;
 ctx.clearRect(0,0,canvas.width,canvas.height);
 Object.entries(cats).forEach(([cat,val])=>{
  const fatia=(val/total)*2*Math.PI;
  ctx.beginPath();
  ctx.moveTo(150,100);
  ctx.arc(150,100,80,inicio,inicio+fatia);
  ctx.fillStyle=coresCat[cat]||'#ccc';
  ctx.fill();
  inicio+=fatia;
 });
}

function graficoLinha(mesSel){
 const canvas=document.getElementById('graficoLinha');
 const ctx=canvas.getContext('2d');
 let saldo=0;
 const dados=[];
 db.filter(i=>i.data.startsWith(mesSel))
 .sort((a,b)=>a.data.localeCompare(b.data))
 .forEach(i=>{ saldo+=(i.tipo==='ganho'?i.valor:-i.valor); dados.push(saldo); });
 if(dados.length===0) return;
 const max=Math.max(...dados);
 const min=Math.min(...dados);
 ctx.clearRect(0,0,canvas.width,canvas.height);
 let x=10;
 const passo=(canvas.width-20)/dados.length;
 ctx.beginPath();
 dados.forEach((v,i)=>{
  const y=canvas.height-((v-min)/(max-min||1))*canvas.height;
  if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  x+=passo;
 });
 ctx.strokeStyle='#007AFF';
 ctx.stroke();
}

window.onload=()=>{
 document.getElementById('data').valueAsDate=new Date();
 document.getElementById('rel-mes').value=new Date().toISOString().substring(0,7);
 listar();
 gerarRel();
};
</script></body>
</html>
