<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#007AFF">
    <title>Finanças Master</title>
    <style>
        :root { --primaria: #007AFF; --ganho: #34C759; --gasto: #FF3B30; --fundo: #F2F2F7; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--fundo); padding-bottom: 90px; }
        .header { background: white; padding: 20px 15px; border-bottom: 1px solid #d1d1d6; position: sticky; top: 0; z-index: 10; text-align: center; }
        .container { padding: 15px; }
        .aba { display: none; }
        .aba.ativa { display: block; }
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        
        /* NOVO SELETOR COM SETAS */
        .seletor-mes { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: bold; font-size: 18px; }
        .btn-seta { background: #e5e5ea; color: var(--primaria); border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 20px; cursor: pointer; }

        .item-lista { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .btn-del { background: var(--gasto); color: white; border: none; padding: 5px 10px; border-radius: 8px; font-size: 12px; }
        .calendario-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #d1d1d6; border-radius: 10px; overflow: hidden; }
        .dia { background: white; min-height: 80px; padding: 4px; font-size: 10px; display: flex; flex-direction: column; }
        .dia-topo { font-weight: bold; color: #8e8e93; }
        .saldo-dia { margin-top: auto; font-weight: bold; text-align: right; font-size: 9px; }
        
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); display: flex; border-top: 1px solid #d1d1d6; height: 75px; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; border: none; background: none; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #8e8e93; font-size: 11px; }
        .nav-item.ativa { color: var(--primaria); font-weight: bold; }
        input, select, button { width: 100%; padding: 14px; margin: 5px 0; border-radius: 12px; border: 1px solid #d1d1d6; font-size: 16px; box-sizing: border-box; }
        .btn-acao { background: var(--primaria); color: white; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="header"><h2 style="margin:0">Finanças Master</h2></div>

<div class="container">
    <div id="aba-add" class="aba ativa">
        <div class="card">
            <input type="date" id="in-data">
            <input type="text" id="in-desc" placeholder="Descrição (ex: Mercado)">
            <input type="number" id="in-valor" placeholder="R$ 0,00" inputmode="decimal">
            <select id="in-tipo">
                <option value="ganho">Ganho (+)</option>
                <option value="gasto">Despesa (-)</option>
            </select>
            <button class="btn-acao" onclick="salvar()">Salvar Lançamento</button>
        </div>
        <div class="card"><div id="lista-mes"></div></div>
    </div>

    <div id="aba-cal" class="aba">
        <div class="seletor-mes">
            <button class="btn-seta" onclick="mudarMes(-1)">❮</button>
            <span id="label-mes">Março 2026</span>
            <button class="btn-seta" onclick="mudarMes(1)">❯</button>
        </div>
        <div class="calendario-grid" id="grid-corpo"></div>
    </div>

    <div id="aba-rel" class="aba">
        <div class="card">
            <label>Início:</label><input type="date" id="rel-inicio">
            <label>Fim:</label><input type="date" id="rel-fim">
            <button class="btn-acao" onclick="renderRel()">Filtrar Período</button>
        </div>
        <div id="resumo" class="card"></div>
    </div>
</div>

<nav class="nav-bottom">
    <button class="nav-item ativa" onclick="mudarAba('add', this)">➕ Lançar</button>
    <button class="nav-item" onclick="mudarAba('cal', this)">📅 Calendário</button>
    <button class="nav-item" onclick="mudarAba('rel', this)">📊 Relatório</button>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem('financas_v_final')) || [];
    let dataReferencia = new Date(); // Controla o mês exibido no calendário

    window.onload = () => {
        document.getElementById('in-data').valueAsDate = new Date();
        atualizarInterface();
    };

    function mudarAba(aba, btn) {
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('ativa'));
        document.getElementById('aba-'+aba).classList.add('ativa');
        btn.classList.add('ativa');
        atualizarInterface();
    }

    function mudarMes(direcao) {
        dataReferencia.setMonth(dataReferencia.getMonth() + direcao);
        renderCal();
        atualizarLista();
    }

    function atualizarInterface() {
        renderCal();
        atualizarLista();
    }

    function salvar() {
        const d = document.getElementById('in-data').value;
        const v = parseFloat(document.getElementById('in-valor').value);
        if(!d || isNaN(v)) return alert("Preencha os campos.");
        
        db.push({ 
            id: Date.now(), 
            data: d, 
            desc: document.getElementById('in-desc').value || 'Sem nome', 
            valor: v, 
            tipo: document.getElementById('in-tipo').value 
        });
        
        db.sort((a,b) => new Date(a.data) - new Date(b.data));
        localStorage.setItem('financas_v_final', JSON.stringify(db));
        document.getElementById('in-valor').value = "";
        document.getElementById('in-desc').value = "";
        atualizarInterface();
        alert("Salvo!");
    }

    function excluir(id) {
        if(confirm("Deseja apagar?")) {
            db = db.filter(i => i.id !== id);
            localStorage.setItem('financas_v_final', JSON.stringify(db));
            atualizarInterface();
        }
    }

    function atualizarLista() {
        const l = document.getElementById('lista-mes');
        const mesFiltro = dataReferencia.toISOString().substring(0, 7);
        l.innerHTML = "<h4>Lançamentos do Mês</h4>";
        
        db.filter(it => it.data.startsWith(mesFiltro)).reverse().forEach(it => {
            const c = it.tipo === 'ganho' ? 'var(--ganho)' : 'var(--gasto)';
            l.innerHTML += `<div class="item-lista">
                <div><b>${it.desc}</b><br><small style="color:${c}">R$ ${it.valor.toFixed(2)}</small></div>
                <button class="btn-del" onclick="excluir(${it.id})">X</button>
            </div>`;
        });
    }

    function renderCal() {
        const grid = document.getElementById('grid-corpo');
        const ano = dataReferencia.getFullYear();
        const mes = dataReferencia.getMonth();
        
        const mesesNomes = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        document.getElementById('label-mes').innerText = `${mesesNomes[mes]} ${ano}`;

        grid.innerHTML = "";
        const primeiroDiaSemana = new Date(ano, mes, 1).getDay();
        const ultimoDiaMes = new Date(ano, mes + 1, 0).getDate();
        
        let saldoAcumulado = 0;
        db.forEach(item => {
            if(new Date(item.data + "T00:00:00") < new Date(ano, mes, 1)) {
                saldoAcumulado += (item.tipo === 'ganho' ? item.valor : -item.valor);
            }
        });

        for(let i=0; i < primeiroDiaSemana; i++) grid.innerHTML += `<div class="dia" style="background:#f2f2f7"></div>`;
        
        for(let d=1; d <= ultimoDiaMes; d++) {
            const dataIso = `${ano}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const itensDia = db.filter(x => x.data === dataIso);
            itensDia.forEach(it => { saldoAcumulado += (it.tipo === 'ganho' ? it.valor : -it.valor); });
            
            grid.innerHTML += `<div class="dia">
                <div class="dia-topo">${d}</div>
                <div class="saldo-dia" style="color:${saldoAcumulado>=0?'var(--ganho)':'var(--gasto)'}">R$ ${saldoAcumulado.toFixed(0)}</div>
            </div>`;
        }
    }

    function renderRel() {
        const ini = document.getElementById('rel-inicio').value;
        const fim = document.getElementById('rel-fim').value;
        if(!ini || !fim) return alert("Selecione as datas");
        const filtrados = db.filter(it => it.data >= ini && it.data <= fim);
        let g=0, s=0; filtrados.forEach(it => it.tipo==='ganho'? g+=it.valor : s+=it.valor);
        document.getElementById('resumo').innerHTML = `<h3>Resultado Período</h3><p>Ganhos: R$ ${g.toFixed(2)}</p><p>Gastos: R$ ${s.toFixed(2)}</p><h4>Saldo: R$ ${(g-s).toFixed(2)}</h4>`;
    }
</script>
</body>
</html>
