<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Finanças Master Elite</title>
    <style>
        :root { --primaria: #007AFF; --ganho: #34C759; --gasto: #FF3B30; --fundo: #F2F2F7; --edicao: #FF9500; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--fundo); height: 100vh; display: flex; flex-direction: column; }
        .header { background: white; padding: 15px; border-bottom: 1px solid #ddd; text-align: center; font-weight: bold; flex-shrink: 0; }
        .conteudo { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }
        .aba { display: none; }
        .aba.ativa { display: block; }
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #ddd; border-radius: 10px; overflow: hidden; }
        .dia { background: white; min-height: 85px; padding: 5px; display: flex; flex-direction: column; font-size: 11px; }
        .dia.hoje { background: #eef7ff; border: 1px solid var(--primaria); }
        .saldo-d { margin-top: auto; font-weight: bold; text-align: right; font-size: 10px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 80px; border-top: 2px solid #eee; z-index: 9999; padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; border: none; background: none; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 13px; color: #888; }
        .nav-btn.ativo { color: var(--primaria); font-weight: bold; }
        input, select, button { width: 100%; padding: 14px; margin: 5px 0; border-radius: 12px; border: 1px solid #ccc; font-size: 16px; }
        .btn-principal { background: var(--primaria); color: white; border: none; font-weight: bold; }
        .btn-editar { background: var(--edicao); color: white; border: none; font-weight: bold; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .tag { font-size: 10px; background: #eee; padding: 2px 6px; border-radius: 4px; color: #666; text-transform: uppercase; }
        .data-item { font-size: 11px; color: #999; font-weight: bold; }
        .acoes { display: flex; gap: 5px; }
        .btn-acao { width: 35px; height: 35px; border-radius: 8px; border: none; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    </style>
</head>
<body>

<div class="header" id="titulo-app">Finanças Master Elite</div>

<div class="conteudo">
    <div id="aba-add" class="aba ativa">
        <div class="card">
            <input type="hidden" id="edit-id">
            <input type="date" id="data">
            <input type="text" id="desc" placeholder="O que comprou?">
            <input type="number" id="valor" placeholder="Valor R$" inputmode="decimal">
            <select id="cat">
                <option value="Alimentação">🍕 Alimentação</option>
                <option value="Transporte">🚗 Transporte</option>
                <option value="Lazer">🎡 Lazer</option>
                <option value="Contas">🏠 Contas Fixas</option>
                <option value="Saúde">🏥 Saúde</option>
                <option value="Mercado">🛒 Mercado</option>
                <option value="Salário">💰 Salário/Renda</option>
                <option value="Outros">⚙️ Outros</option>
            </select>
            <select id="tipo"><option value="gasto">Despesa (-)</option><option value="ganho">Ganho (+)</option></select>
            <button id="btn-salvar" class="btn-principal" onclick="salvar()">Salvar Lançamento</button>
            <button id="btn-cancelar" style="display:none; background:#888; color:white;" onclick="cancelarEdicao()">Cancelar Edição</button>
        </div>
        <div id="lista" class="card"></div>
    </div>

    <div id="aba-cal" class="aba">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <button onclick="mudarMes(-1)" style="width:50px; background:#eee; border:none; border-radius:10px;">❮</button>
            <span id="mes-label" style="font-size:18px; font-weight:bold"></span>
            <button onclick="mudarMes(1)" style="width:50px; background:#eee; border:none; border-radius:10px;">❯</button>
        </div>
        <div class="grid" id="grid"></div>
    </div>

    <div id="aba-rel" class="aba">
        <div class="card">
            <input type="month" id="rel-mes" onchange="gerarRel()">
            <div id="resumo-total"></div>
        </div>
        <div id="resumo-categorias" class="card">
            <strong>Gastos por Categoria</strong>
            <div id="cat-lista" style="margin-top:15px"></div>
        </div>
    </div>
</div>

<div class="nav">
    <button class="nav-btn ativo" onclick="ir('add', this)">➕ Lançar</button>
    <button class="nav-btn" onclick="ir('cal', this)">📅 Calendário</button>
    <button class="nav-btn" onclick="ir('rel', this)">📊 Gráficos</button>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('financas_v_final')) || [];
    let dataRef = new Date();

    function ir(aba, btn) {
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('ativo'));
        document.getElementById('aba-' + aba).classList.add('ativa');
        btn.classList.add('ativo');
        if(aba === 'cal') render();
        if(aba === 'add') { listar(); cancelarEdicao(); }
        if(aba === 'rel') gerarRel();
    }

    function mudarMes(n) { dataRef.setMonth(dataRef.getMonth() + n); render(); }

    function salvar() {
        const d = document.getElementById('data').value, v = parseFloat(document.getElementById('valor').value);
        const editId = document.getElementById('edit-id').value;
        if(!d || isNaN(v)) return alert("Preencha os campos!");

        const novoItem = { 
            id: editId ? parseInt(editId) : Date.now(), 
            data: d, 
            desc: document.getElementById('desc').value || 'S/N', 
            valor: v, 
            tipo: document.getElementById('tipo').value,
            cat: document.getElementById('cat').value 
        };

        if(editId) {
            db = db.map(item => item.id === parseInt(editId) ? novoItem : item);
        } else {
            db.push(novoItem);
        }

        db.sort((a,b) => new Date(a.data) - new Date(b.data));
        localStorage.setItem('financas_v_final', JSON.stringify(db));
        
        cancelarEdicao();
        listar();
    }

    function prepararEdicao(id) {
        const item = db.find(i => i.id === id);
        document.getElementById('edit-id').value = item.id;
        document.getElementById('data').value = item.data;
        document.getElementById('desc').value = item.desc;
        document.getElementById('valor').value = item.valor;
        document.getElementById('cat').value = item.cat;
        document.getElementById('tipo').value = item.tipo;
        
        const btn = document.getElementById('btn-salvar');
        btn.innerText = "Atualizar Lançamento";
        btn.className = "btn-editar";
        document.getElementById('btn-cancelar').style.display = "block";
        window.scrollTo(0,0);
    }

    function cancelarEdicao() {
        document.getElementById('edit-id').value = "";
        document.getElementById('data').valueAsDate = new Date();
        document.getElementById('desc').value = "";
        document.getElementById('valor').value = "";
        const btn = document.getElementById('btn-salvar');
        btn.innerText = "Salvar Lançamento";
        btn.className = "btn-principal";
        document.getElementById('btn-cancelar').style.display = "none";
    }

    function deletar(id) {
        if(confirm("Apagar permanentemente?")) { db = db.filter(i => i.id !== id); localStorage.setItem('financas_v_final', JSON.stringify(db)); listar(); }
    }

    function listar() {
        const l = document.getElementById('lista'), m = dataRef.toISOString().substring(0, 7);
        l.innerHTML = "<strong>Histórico de Lançamentos</strong>";
        
        const filtrados = db.filter(i => i.data.startsWith(m)).reverse();
        
        if(filtrados.length === 0) l.innerHTML += "<p style='color:#888; text-align:center; padding:20px;'>Nenhum lançamento neste mês.</p>";

        filtrados.forEach(i => {
            const dataBR = i.data.split('-').reverse().join('/');
            l.innerHTML += `
            <div class="item">
                <div>
                    <span class="data-item">${dataBR}</span> <span class="tag">${i.cat}</span><br>
                    <strong>${i.desc}</strong><br>
                    <small style="color:${i.tipo=='ganho'?'green':'red'}">R$ ${i.valor.toFixed(2)}</small>
                </div>
                <div class="acoes">
                    <button onclick="prepararEdicao(${i.id})" class="btn-acao" style="background:#e3f2fd; color:#1976d2">✏️</button>
                    <button onclick="deletar(${i.id})" class="btn-acao" style="background:#ffebee; color:#d32f2f">🗑️</button>
                </div>
            </div>`;
        });
    }

    function render() {
        const g = document.getElementById('grid'), label = document.getElementById('mes-label');
        const ano = dataRef.getFullYear(), mes = dataRef.getMonth();
        const nomes = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
        label.innerText = nomes[mes] + " " + ano;
        g.innerHTML = "";
        const inicio = new Date(ano, mes, 1).getDay(), fim = new Date(ano, mes+1, 0).getDate();
        let saldo = 0;
        db.forEach(i => { if(new Date(i.data + "T00:00:00") < new Date(ano, mes, 1)) saldo += (i.tipo=='ganho'?i.valor:-i.valor); });
        for(let i=0; i<inicio; i++) g.innerHTML += `<div class="dia" style="background:#eee"></div>`;
        for(let d=1; d<=fim; d++) {
            const dataI = `${ano}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            db.filter(x => x.data === dataI).forEach(i => saldo += (i.tipo=='ganho'?i.valor:-i.valor));
            g.innerHTML += `<div class="dia ${dataI==new Date().toISOString().substring(0,10)?'hoje':''}"><b>${d}</b><div class="saldo-d" style="color:${saldo>=0?'green':'red'}">${saldo.toFixed(0)}</div></div>`;
        }
    }

    function gerarRel() {
        const mesSel = document.getElementById('rel-mes').value || dataRef.toISOString().substring(0, 7);
        const filtrados = db.filter(it => it.data.startsWith(mesSel));
        let g=0, s=0, cats = {};
        filtrados.forEach(it => {
            if(it.tipo === 'ganho') g += it.valor;
            else { s += it.valor; cats[it.cat] = (cats[it.cat] || 0) + it.valor; }
        });
        document.getElementById('resumo-total').innerHTML = `Ganhos: <span style="color:green">R$ ${g.toFixed(2)}</span><br>Gastos: <span style="color:red">R$ ${s.toFixed(2)}</span><hr>Saldo: <strong>R$ ${(g-s).toFixed(2)}</strong>`;
        const catLista = document.getElementById('cat-lista');
        catLista.innerHTML = "";
        const sortCats = Object.entries(cats).sort((a,b) => b[1] - a[1]);
        for(let [c, val] of sortCats) {
            const perc = (val / s * 100).toFixed(0);
            catLista.innerHTML += `<div style="margin-bottom:10px">
                <div style="display:flex; justify-content:space-between; font-size:14px"><span>${c}</span><span>R$ ${val.toFixed(2)} (${perc}%)</span></div>
                <div style="background:#eee; height:8px; border-radius:4px; margin-top:4px"><div style="background:var(--primaria); height:8px; border-radius:4px; width:${perc}%"></div></div>
            </div>`;
        }
    }

    window.onload = () => { 
        document.getElementById('data').valueAsDate = new Date(); 
        document.getElementById('rel-mes').value = dataRef.toISOString().substring(0, 7);
        listar(); render();
    };
</script>
</body>
</html>
